<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WearStore | Mi Perfil</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9900",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231b0f",
                        "brand-blue": "#131921",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"], "mecha": ["Rajdhani", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-left-color: #06b6d4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
    <script src="js/theme.js"></script>
</head>

<body
    class="bg-background-light dark:bg-slate-900 text-slate-900 dark:text-gray-100 font-display min-h-screen flex flex-col transition-colors duration-300">

    <!-- Barra de Navegación -->
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-brand-blue text-white shadow-md h-16 flex items-center px-4 md:px-10">
        <div class="max-w-[1440px] w-full mx-auto flex items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-2 shrink-0 group">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-400 to-amber-600 dark:from-cyan-400 dark:to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(255,153,0,0.4)] dark:shadow-[0_0_15px_rgba(0,183,255,0.4)] transition-transform duration-300 group-hover:scale-110">
                    <span class="material-symbols-outlined text-white text-2xl"
                        style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
                </div>
                <div class="flex flex-col justify-center translate-y-[2px]">
                    <span class="text-lg font-black tracking-widest text-white leading-none">WEAR<span
                            class="text-orange-400 dark:text-cyan-400 transition-colors duration-500">STORE</span></span>
                    <span class="text-[0.55rem] font-bold text-cyan-400 ml-1 uppercase tracking-widest mt-1">MI
                        PERFIL</span>
                </div>
            </a>

            <div class="flex items-center gap-4 shrink-0">
                <a href="index.html" class="text-sm font-bold hover:underline flex items-center gap-1 text-cyan-400">
                    <span class="material-symbols-outlined">storefront</span> Volver a la Tienda
                </a>

                <button onclick="toggleTheme()"
                    class="relative w-20 h-8 md:w-24 md:h-10 bg-gradient-to-r from-orange-400 via-red-500 to-red-600 dark:bg-none dark:bg-slate-800 rounded-full shadow-inner border border-slate-400 dark:border-slate-600 transition-colors duration-300 mx-2 flex items-center group shrink-0"
                    title="Cambiar Tema (Anime)">
                    <div class="absolute inset-0 rounded-full overflow-hidden pointer-events-none z-0">
                        <canvas class="themeAnimeCanvas absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <span
                        class="theme-icon-toggle absolute -left-2 top-1/2 -translate-y-1/2 transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] transform dark:translate-x-10 md:dark:translate-x-12 z-10 w-14 h-14 md:w-16 md:h-16 flex items-center justify-center"></span>
                </button>

                <!-- Cuenta -->
                <div class="auth-container-ui hidden lg:flex"></div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-12 flex-1 relative">
        <div class="max-w-2xl mx-auto px-4">
            <div
                class="relative bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.06)] dark:shadow-none p-8 transition-colors duration-300 overflow-hidden">
                <div
                    class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-600">
                </div>

                <h2 class="text-3xl font-black mb-2 flex items-center gap-3 mt-1">
                    <span class="material-symbols-outlined text-cyan-500 text-4xl">account_circle</span>
                    Configuración de Perfil
                </h2>
                <p class="text-slate-500 dark:text-slate-400 mb-8 pb-6 border-b border-slate-100 dark:border-slate-700">
                    Actualiza tus datos de envío e información de contacto para agilizar tus compras.
                </p>

                <div id="loadingOverlay"
                    class="absolute inset-0 bg-white/80 dark:bg-slate-800/80 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center transition-opacity">
                    <span class="spinner"></span>
                    <span class="mt-4 font-bold text-slate-500">Cargando perfil...</span>
                </div>

                <form id="perfilForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Nombres -->
                        <div class="md:col-span-1">
                            <label
                                class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Nombres</label>
                            <input type="text" id="perfilNombres" required
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all"
                                placeholder="Tus nombres" />
                        </div>

                        <!-- Apellidos -->
                        <div class="md:col-span-1">
                            <label
                                class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Apellidos</label>
                            <input type="text" id="perfilApellidos" required
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all"
                                placeholder="Tus apellidos" />
                        </div>

                        <!-- Email (Solo lectura) -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Correo
                                Electrónico (Tu cuenta)</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                                <input type="email" id="perfilEmail" disabled
                                    class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 cursor-not-allowed" />
                            </div>
                        </div>

                        <!-- Teléfono -->
                        <div class="md:col-span-1">
                            <label
                                class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Teléfono</label>
                            <input type="tel" id="perfilTelefono"
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all"
                                placeholder="+57 300 123 4567" />
                        </div>

                        <!-- Documento -->
                        <div class="md:col-span-1">
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Cédula /
                                ID</label>
                            <input type="text" id="perfilDocumento"
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all"
                                placeholder="Ej. 102345678" />
                        </div>

                        <!-- Dirección -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-200 mb-2">Dirección de
                                Envío Predeterminada</label>
                            <textarea id="perfilDireccion" rows="3"
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all"
                                placeholder="Calle, Barrio, Ciudad, Detalles adicionales..."></textarea>
                        </div>
                    </div>

                    <button type="submit" id="btnGuardarPerfil"
                        class="w-full mt-8 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-cyan-500/30 transition-all flex justify-center items-center gap-3">
                        <span class="material-symbols-outlined">save</span>
                        Guardar Información
                    </button>
                    <!-- Error Box -->
                    <div id="errorBox"
                        class="hidden mt-4 bg-red-50 border border-red-200 text-red-600 p-4 rounded-lg flex items-center gap-2">
                        <span class="material-symbols-outlined">error</span>
                        <span id="errorText"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/api.js?v=12"></script>
    <script src="js/auth.js?v=13"></script>
    <script src="js/pixelconfirm.js?v=2"></script>
    <script src="js/perfil.js?v=1"></script>
    <script src="js/magnetic.js"></script>
</body>

</html>
